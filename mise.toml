[tools]
age = "1.3.1"
ansible-core = "2.20.3"
pipx = "1.8.0"
"pipx:ansible-lint" = "26.3.0"
python = "3.14.3"
sops = "3.12.2"
yamllint = "1.38.0"

[env]
# Set SOPS_AGE_KEY_FILE to ./age.key if SOPS_AGE_KEY is not set
SOPS_AGE_KEY_FILE = "{% if env.SOPS_AGE_KEY %}{% else %}{{ config_root }}/age.key{% endif %}"
_.file = { path = ".env.json", redact = true }

[settings]
sops.strict = false